<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Secure Terminal Sign-In | MediFind</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#00685f",
                        "primary-container": "#008378",
                        "secondary": "#006c49",
                        "secondary-container": "#6cf8bb",
                        "background": "#f5faf8",
                        "surface": "#f5faf8",
                        "on-surface": "#171d1c",
                        "on-surface-variant": "#3d4947",
                        "outline-variant": "#bcc9c6",
                        "surface-container-lowest": "#ffffff",
                        "surface-dim": "#d6dbd9",
                        "surface-container-high": "#e4e9e7",
                        "surface-tint": "#006a61"
                    },
                    borderRadius: {
                        "lg": "0.5rem",
                        "xl": "1rem"
                    }
                }
            }
        }
    </script>
    <link href="../css/global.css" rel="stylesheet"/>
    <link href="../css/auth.css" rel="stylesheet"/>
</head>
<body class="bg-background text-on-surface font-sans min-h-screen flex items-center justify-center p-4 md:p-8 dark:bg-[#111716] dark:text-[#edf2f0]">

    <div class="max-w-md w-full bg-white dark:bg-[#151c1b] border border-outline-variant/30 rounded-xl overflow-hidden shadow-2xl p-6 md:p-8 space-y-6 animate-fade-in-up">
        
        <!-- Header / Theme Toggle -->
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-primary text-2xl font-bold dark:text-secondary-container">health_and_safety</span>
                <span class="font-headline-md text-lg font-bold text-primary dark:text-[#6cf8bb]">MediFind Console</span>
            </div>
            <button id="themeToggleBtn" class="p-2 rounded-lg border border-outline-variant hover:bg-surface-container transition-colors shadow-sm">
                <span class="material-symbols-outlined text-primary dark:text-secondary-container">contrast</span>
            </button>
        </div>

        <!-- Banner Info -->
        <div class="text-left space-y-1">
            <h3 class="text-base font-bold font-headline-md text-slate-800 dark:text-white">Secure Terminal Access</h3>
            <p class="text-[11px] text-on-surface-variant dark:text-outline-variant">Authorized clinical operators only. Logs are synchronized with CDSCO guidelines.</p>
        </div>

        <!-- Credentials Form -->
        <form id="loginForm" class="space-y-4" novalidate>
            
            <!-- 1. Secure Email Address -->
            <div>
                <label for="loginEmail" class="block text-[10px] font-bold uppercase tracking-widest text-outline mb-1.5">Secure Email Address</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-lg">mail</span>
                    <input type="email" id="loginEmail" required placeholder="e.g. sarah@medifind.com" class="w-full bg-surface dark:bg-[#1a2221] border border-outline-variant rounded-lg pl-10 pr-4 py-2 text-xs font-semibold focus:ring-2 focus:ring-primary focus:border-primary transition-all"/>
                </div>
            </div>

            <!-- 2. Password -->
            <div>
                <label for="loginPassword" class="block text-[10px] font-bold uppercase tracking-widest text-outline mb-1.5">Password</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-lg">lock</span>
                    <input type="password" id="loginPassword" required placeholder="••••••••" class="w-full bg-surface dark:bg-[#1a2221] border border-outline-variant rounded-lg pl-10 pr-4 py-2 text-xs font-mono focus:ring-2 focus:ring-primary focus:border-primary transition-all"/>
                </div>
            </div>

            <button type="submit" class="w-full bg-primary text-white font-bold py-3 rounded-lg flex items-center justify-center gap-2 hover:bg-primary-container active:scale-[0.98] transition-all shadow-md text-xs uppercase tracking-wider pt-3">
                <span class="material-symbols-outlined text-sm">lock_open</span>
                Unlock Console Terminal
            </button>
        </form>

        <div class="text-center text-[10px] text-outline dark:text-outline-variant pt-2">
            <span>Not registered?</span> 
            <a href="register.html" class="text-primary dark:text-teal-400 font-bold hover:underline ml-1">Configure Store Node</a>
        </div>

    </div>

    <!-- Storage and State Broker scripts -->
    <script src="../shared.js"></script>
    <script>
        const loginForm = document.getElementById("loginForm");
        const emailInput = document.getElementById("loginEmail");
        const passwordInput = document.getElementById("loginPassword");

        loginForm.addEventListener("submit", (e) => {
            e.preventDefault();

            const emailVal = emailInput.value.trim();
            const passwordVal = passwordInput.value;

            if (!emailVal || !passwordVal) {
                showToast("Please input both credentials", false);
                return;
            }

            // Call real backend login API
            fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email_address: emailVal, password: passwordVal })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    // Save user session inside localStorage
                    localStorage.setItem("ps_active_user", JSON.stringify(data.user));
                    localStorage.setItem("ps_store_config", JSON.stringify(data.store));
                    
                    showToast("Terminal Unlocked! Redirecting to dashboard...");
                    setTimeout(() => {
                        window.location.href = "dashboard.html";
                    }, 1200);
                } else {
                    showToast(data.message || "Access Denied! Incorrect email or password.", false);
                }
            })
            .catch(err => {
                console.error(err);
                showToast("Connection error. Ensure the Express server is running.", false);
            });
        });
    </script>
</body>
</html>

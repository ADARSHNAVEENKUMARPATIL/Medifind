<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Configure Store Instance | MediFind</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#00685f",
                        "primary-container": "#008378",
                        "secondary": "#006c49",
                        "secondary-container": "#6cf8bb",
                        "background": "#f5faf8",
                        "surface": "#f5faf8",
                        "on-surface": "#171d1c",
                        "on-surface-variant": "#3d4947",
                        "outline-variant": "#bcc9c6",
                        "surface-container-lowest": "#ffffff",
                        "surface-dim": "#d6dbd9",
                        "surface-container-high": "#e4e9e7",
                        "surface-tint": "#006a61"
                    },
                    borderRadius: {
                        "lg": "0.5rem",
                        "xl": "1rem"
                    }
                }
            }
        }
    </script>
    <link href="../css/global.css" rel="stylesheet"/>
    <link href="../css/auth.css" rel="stylesheet"/>
</head>
<body class="bg-background text-on-surface font-sans min-h-screen flex items-center justify-center p-4 md:p-8 dark:bg-[#111716] dark:text-[#edf2f0]">

    <div class="max-w-3xl w-full bg-white dark:bg-[#151c1b] border border-outline-variant/30 rounded-xl overflow-hidden shadow-2xl flex flex-col min-h-[600px] animate-fade-in-up">
        
        <!-- Header -->
        <div class="bg-primary dark:bg-[#08423c] p-6 text-white flex justify-between items-center">
            <div class="flex items-center gap-3">
                <a href="welcome.html" class="p-1 rounded hover:bg-white/10 transition-colors">
                    <span class="material-symbols-outlined text-white">arrow_back</span>
                </a>
                <div>
                    <h2 class="text-xl font-bold font-headline-md leading-none">Register Store</h2>
                    <p class="text-[10px] text-white/70 uppercase tracking-widest mt-1">First-Time Medical Node Configuration</p>
                </div>
            </div>
            
            <!-- Theme Toggle -->
            <button id="themeToggleBtn" class="p-2 rounded-lg border border-white/20 hover:bg-white/10 transition-colors">
                <span class="material-symbols-outlined text-white">contrast</span>
            </button>
        </div>

        <!-- Form Section -->
        <div class="p-6 md:p-8 flex-grow">
            <form id="registerForm" class="space-y-6">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    
                    <!-- 1. Medical Store Name -->
                    <div>
                        <label for="storeName" class="block text-[10px] font-bold uppercase tracking-widest text-outline mb-1.5">Medical Store Name</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-lg">store</span>
                            <input type="text" id="storeName" required placeholder="e.g. Apollo Pharmacy Node-01" class="w-full bg-surface dark:bg-[#1a2221] border border-outline-variant rounded-lg pl-10 pr-4 py-2 text-xs font-semibold focus:ring-2 focus:ring-primary focus:border-primary transition-all"/>
                        </div>
                    </div>

                    <!-- 2. Drug License Number -->
                    <div>
                        <label for="licenseNumber" class="block text-[10px] font-bold uppercase tracking-widest text-outline mb-1.5">Drug License Number</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-lg">verified</span>
                            <input type="text" id="licenseNumber" required placeholder="E.G. DL-1123-W" class="w-full bg-surface dark:bg-[#1a2221] border border-outline-variant rounded-lg pl-10 pr-4 py-2 text-xs font-semibold focus:ring-2 focus:ring-primary focus:border-primary transition-all"/>
                        </div>
                    </div>

                    <!-- 3. Store Address -->
                    <div class="md:col-span-2">
                        <label for="storeAddress" class="block text-[10px] font-bold uppercase tracking-widest text-outline mb-1.5">Store Address</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-3 top-4 text-outline text-lg">location_on</span>
                            <textarea id="storeAddress" required rows="2" placeholder="e.g. 3rd Floor, Medical Wing A, Metro General Hospital" class="w-full bg-surface dark:bg-[#1a2221] border border-outline-variant rounded-lg pl-10 pr-4 py-2 text-xs font-semibold focus:ring-2 focus:ring-primary focus:border-primary transition-all resize-none"></textarea>
                        </div>
                    </div>

                    <!-- 4. Contact Number -->
                    <div>
                        <label for="contactNumber" class="block text-[10px] font-bold uppercase tracking-widest text-outline mb-1.5">Contact Number</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-lg">phone</span>
                            <input type="tel" id="contactNumber" required placeholder="e.g. +91 98765 43210" class="w-full bg-surface dark:bg-[#1a2221] border border-outline-variant rounded-lg pl-10 pr-4 py-2 text-xs font-mono focus:ring-2 focus:ring-primary focus:border-primary transition-all"/>
                        </div>
                    </div>

                    <!-- 5. Pharmacist Registration Number -->
                    <div>
                        <label for="pharmacistRegNo" class="block text-[10px] font-bold uppercase tracking-widest text-outline mb-1.5">Pharmacist Registration Number</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-lg">badge</span>
                            <input type="text" id="pharmacistRegNo" required placeholder="E.G. RPH-99232-DL" class="w-full bg-surface dark:bg-[#1a2221] border border-outline-variant rounded-lg pl-10 pr-4 py-2 text-xs font-semibold focus:ring-2 focus:ring-primary focus:border-primary transition-all"/>
                        </div>
                    </div>

                    <!-- 6. Pharmacist Full Name -->
                    <div>
                        <label for="pharmacistName" class="block text-[10px] font-bold uppercase tracking-widest text-outline mb-1.5">Pharmacist Full Name</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-lg">person</span>
                            <input type="text" id="pharmacistName" required placeholder="e.g. Dr. Sarah Chen" class="w-full bg-surface dark:bg-[#1a2221] border border-outline-variant rounded-lg pl-10 pr-4 py-2 text-xs font-semibold focus:ring-2 focus:ring-primary focus:border-primary transition-all"/>
                        </div>
                    </div>

                    <!-- 7. Secure Email Address -->
                    <div>
                        <label for="secureEmail" class="block text-[10px] font-bold uppercase tracking-widest text-outline mb-1.5">Secure Email Address</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-lg">mail</span>
                            <input type="email" id="secureEmail" required placeholder="e.g. sarah@medifind.com" class="w-full bg-surface dark:bg-[#1a2221] border border-outline-variant rounded-lg pl-10 pr-4 py-2 text-xs font-semibold focus:ring-2 focus:ring-primary focus:border-primary transition-all"/>
                        </div>
                    </div>

                    <!-- 8. Password & Confirm Password (Side-by-Side) -->
                    <div class="md:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label for="password" class="block text-[10px] font-bold uppercase tracking-widest text-outline mb-1.5">Password</label>
                            <div class="relative">
                                <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-lg">lock</span>
                                <input type="password" id="password" required placeholder="••••••••" class="password-input w-full bg-surface dark:bg-[#1a2221] border border-outline-variant rounded-lg pl-10 pr-4 py-2 text-xs font-mono focus:ring-2 focus:ring-primary focus:border-primary transition-all"/>
                            </div>
                        </div>
                        <div>
                            <label for="confirmPassword" class="block text-[10px] font-bold uppercase tracking-widest text-outline mb-1.5">Confirm Password</label>
                            <div class="relative">
                                <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-lg">lock_reset</span>
                                <input type="password" id="confirmPassword" required placeholder="••••••••" class="password-input w-full bg-surface dark:bg-[#1a2221] border border-outline-variant rounded-lg pl-10 pr-4 py-2 text-xs font-mono focus:ring-2 focus:ring-primary focus:border-primary transition-all"/>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Crimson Red alert message container -->
                <div id="errorAlertContainer" class="hidden bg-[#ffdad6] text-[#93000a] border border-[#ba1a1a]/30 p-4 rounded-lg flex gap-3 items-start animate-fade-in">
                    <span class="material-symbols-outlined text-[#ba1a1a] text-xl">error</span>
                    <div>
                        <p class="font-bold text-xs uppercase tracking-wider">Security Validation Error</p>
                        <p id="errorAlertText" class="text-xs mt-1 leading-relaxed"></p>
                    </div>
                </div>

                <!-- Submit Button -->
                <div class="pt-4 flex justify-between items-center">
                    <a href="welcome.html" class="text-xs text-primary dark:text-[#6cf8bb] hover:underline font-bold">Cancel Registration</a>
                    <button type="submit" class="px-6 py-3 bg-primary text-white hover:bg-primary-container dark:bg-secondary-container dark:text-[#111716] dark:hover:bg-[#4edea3] rounded-lg text-xs font-bold uppercase transition-all shadow-md active:scale-[0.98]">
                        Register Store
                    </button>
                </div>
            </form>
        </div>

    </div>

    <!-- Storage and State Broker scripts -->
    <script src="../shared.js"></script>
    <script>
        const registerForm = document.getElementById("registerForm");
        const storeNameInput = document.getElementById("storeName");
        const licenseInput = document.getElementById("licenseNumber");
        const addressInput = document.getElementById("storeAddress");
        const contactInput = document.getElementById("contactNumber");
        const regNoInput = document.getElementById("pharmacistRegNo");
        const nameInput = document.getElementById("pharmacistName");
        const emailInput = document.getElementById("secureEmail");
        const passwordInput = document.getElementById("password");
        const confirmInput = document.getElementById("confirmPassword");

        const errorContainer = document.getElementById("errorAlertContainer");
        const errorText = document.getElementById("errorAlertText");

        registerForm.addEventListener("submit", (e) => {
            e.preventDefault();

            // Clear previous styles
            errorContainer.classList.add("hidden");
            passwordInput.classList.remove("border-[#ba1a1a]", "focus:ring-[#ba1a1a]");
            confirmInput.classList.remove("border-[#ba1a1a]", "focus:ring-[#ba1a1a]");

            // Check required fields
            if (!registerForm.checkValidity()) {
                const invalidInput = registerForm.querySelector(":invalid");
                if (invalidInput) {
                    invalidInput.focus();
                    showError(`Please fill out the "${invalidInput.labels[0].textContent}" correctly.`);
                }
                return;
            }

            const passwordVal = passwordInput.value;
            const confirmVal = confirmInput.value;

            // Strict RegEx Validation:
            const specRegex = /(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*#?&_#^-])/;

            if (!specRegex.test(passwordVal)) {
                passwordInput.classList.add("border-[#ba1a1a]", "focus:ring-[#ba1a1a]");
                passwordInput.focus();
                showError("Password does not meet safety constraints! It must contain at least one letter, at least one numerical digit, and at least one special character symbol (like @, #, $, !, %, etc.).");
                return;
            }

            if (passwordVal !== confirmVal) {
                confirmInput.classList.add("border-[#ba1a1a]", "focus:ring-[#ba1a1a]");
                confirmInput.focus();
                showError("Password mismatch! Please ensure your Password and Confirm Password entries are exactly identical.");
                return;
            }

            // Real backend registration API payload
            const registerPayload = {
                store_name: storeNameInput.value.trim(),
                drug_license_no: licenseInput.value.trim(),
                store_address: addressInput.value.trim(),
                contact_number: contactInput.value.trim(),
                pharmacist_reg_no: regNoInput.value.trim(),
                full_name: nameInput.value.trim(),
                email_address: emailInput.value.trim(),
                password: passwordVal
            };

            fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(registerPayload)
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    showToast("Store Node registered successfully! Redirecting to sign in...");
                    setTimeout(() => {
                        window.location.href = "login.html";
                    }, 1500);
                } else {
                    showError(data.message || "Registration failed. Email or License number already exists.");
                }
            })
            .catch(err => {
                console.error(err);
                showError("Network connection error. Please ensure the Express server is running.");
            });
        });

        function showError(msg) {
            errorText.textContent = msg;
            errorContainer.classList.remove("hidden");
            errorContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
    </script>
</body>
</html>
